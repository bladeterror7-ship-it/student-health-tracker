<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wellbe-logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WELLBE+ — Сурагч, Админ, Эцэг эхийн эрүүл мэндийн портал" />
    <title>WELLBE+</title>
  </head>
  <body>
    <noscript>
      JavaScript шаардлагатай — Safari тохиргооноос идэвхжүүлнэ үү.
    </noscript>
    <div id="root">
      <!-- React ачаалагдахад энэ блок автоматаар солигдоно -->
      <div
        id="vite-boot-placeholder"
        style="
          margin: 0;
          padding: clamp(24px, 5vw, 48px);
          min-height: 100vh;
          font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
          background: linear-gradient(145deg, #ecfdf5 0%, #fff7ed 50%, #f0fdf4 100%);
          color: #0f172a;
          line-height: 1.55;
          box-sizing: border-box;
        "
      >
        <img
          src="/wellbe-logo.png"
          alt="WELLBE+"
          width="240"
          height="90"
          style="display: block; max-width: min(100%, 240px); height: auto; margin: 0 0 16px 0"
        />
        <p style="margin: 0 0 8px 0; font-size: 1rem; font-weight: 600; opacity: 0.9">
          Ачааллаж байна…
        </p>
        <p style="margin: 0 0 16px 0; font-size: 0.95rem; opacity: 0.92">
          Хэрэв энэ мессеж удаан үлдээд байвал хаягаа цэвэрхэн
          <b style="margin: 0 4px"> http://localhost:5173/</b>
          гэж оруулаад орно уу — порт
          <b style="margin: 0 4px">5173</b>
          заавал байна.
        </p>
        <p style="margin: 0 0 8px 0; font-size: 0.9rem">
          Терминал:
          <code style="background: #fff; padding: 2px 8px; border-radius: 6px">npm run dev</code>
        </p>
        <p style="margin: 0; font-size: 0.85rem; opacity: 0.8">
          Зөвхөн<code style="background: #fff; padding: 2px 6px; margin: 0 4px; border-radius: 6px">localhost</code>(портгүй)
          дарвал Vite хангахгүй тул цагаан дэлгэц гарч болно.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
